name: Daily Dataset Pipeline

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC daily
  workflow_dispatch:        # manual trigger from GitHub UI
    inputs:
      task_target:
        description: 'Number of tasks to generate'
        required: false
        default: '18'

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 180   # 3hr hard limit

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create registry directory
        run: mkdir -p registry

      - name: Run pipeline
        env:
          GROQ_API_KEY:          ${{ secrets.GROQ_API_KEY }}
          GOOGLE_API_KEY:        ${{ secrets.GOOGLE_API_KEY }}
          OPENROUTER_API_KEY_1:  ${{ secrets.OPENROUTER_API_KEY_1 }}
          OPENROUTER_API_KEY_2:  ${{ secrets.OPENROUTER_API_KEY_2 }}
          OPENROUTER_API_KEY_3:  ${{ secrets.OPENROUTER_API_KEY_3 }}
          HF_TOKEN:              ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO:       ${{ vars.HF_DATASET_REPO }}
          GITHUB_TOKEN:          ${{ secrets.GH_PAT }}
          DAILY_TASK_TARGET:     ${{ github.event.inputs.task_target || '18' }}
          RUN_ONCE:              "true"
        run: python main.py

      - name: Upload run logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_number }}
          path: registry/run_*.json
          retention-days: 30

      - name: Upload batch backups
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: batch-backup-${{ github.run_number }}
          path: registry/batch_*.jsonl
          retention-days: 30